<meta charset="utf-8">
<title>ZEN Study 学習数 — 方針A 即時充実</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  /* ---- palette (dataviz reference instance) ---------------------------- */
  .viz-root{
    color-scheme:light;
    --page:#f9f9f7;
    --surface-1:#fcfcfb;
    --text-primary:#0b0b0b;
    --text-secondary:#52514e;
    --text-muted:#898781;
    --grid:#e1e0d9;
    --baseline:#c3c2b7;
    --series-1:#2a78d6;      /* magnitude, single hue (light) */
    --series-wash:#cde2fb;   /* blue ramp step 100 — recessive track */
    --delta-good:#006300;
    --border:rgba(11,11,11,0.10);
    --hover-wash:rgba(42,120,214,0.10);
  }
  @media (prefers-color-scheme:dark){
    :root:where(:not([data-theme="light"])) .viz-root{
      color-scheme:dark;
      --page:#0d0d0d;
      --surface-1:#1a1a19;
      --text-primary:#ffffff;
      --text-secondary:#c3c2b7;
      --text-muted:#898781;
      --grid:#2c2c2a;
      --baseline:#383835;
      --series-1:#3987e5;
      --series-wash:#184f95;
      --delta-good:#0ca30c;
      --border:rgba(255,255,255,0.10);
      --hover-wash:rgba(57,135,229,0.16);
    }
  }
  :root[data-theme="dark"] .viz-root{
    color-scheme:dark;
    --page:#0d0d0d;
    --surface-1:#1a1a19;
    --text-primary:#ffffff;
    --text-secondary:#c3c2b7;
    --text-muted:#898781;
    --grid:#2c2c2a;
    --baseline:#383835;
    --series-1:#3987e5;
    --series-wash:#184f95;
    --delta-good:#0ca30c;
    --border:rgba(255,255,255,0.10);
    --hover-wash:rgba(57,135,229,0.16);
  }

  *{box-sizing:border-box}
  .viz-root{
    font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
    background:var(--page);
    color:var(--text-primary);
    min-height:100vh;
    margin:0;padding:24px 16px 48px;
    display:flex;justify-content:center;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{width:100%;max-width:760px}

  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:12px}
  .topbar h1{font-size:13px;font-weight:600;letter-spacing:.02em;color:var(--text-secondary);margin:0;text-transform:none}
  .theme-btn{
    font:inherit;font-size:12px;color:var(--text-secondary);
    background:var(--surface-1);border:1px solid var(--border);
    border-radius:8px;padding:6px 10px;cursor:pointer;line-height:1;
  }
  .theme-btn:hover{color:var(--text-primary)}

  .card{
    background:var(--surface-1);
    border:1px solid var(--border);
    border-radius:16px;
    padding:22px 22px 20px;
    box-shadow:0 1px 2px rgba(0,0,0,.04);
  }
  .card-head{display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap}
  .card-title{font-size:15px;font-weight:600;margin:0}
  .card-sub{font-size:12px;color:var(--text-muted);margin:2px 0 0}

  /* ---- hero + inline kpis --------------------------------------------- */
  .hero-row{
    display:flex;align-items:flex-end;justify-content:space-between;
    gap:20px;flex-wrap:wrap;margin:16px 0 4px;
  }
  .hero{display:flex;align-items:baseline;gap:12px}
  .hero-num{font-size:56px;font-weight:650;line-height:.95;letter-spacing:-.02em}
  .hero-unit{font-size:15px;color:var(--text-muted);font-weight:500}
  .hero-label{font-size:12px;color:var(--text-muted);margin:0 0 6px}
  .delta{
    display:inline-flex;align-items:center;gap:4px;
    font-size:13px;font-weight:600;color:var(--delta-good);
    background:color-mix(in srgb,var(--delta-good) 12%,transparent);
    border-radius:999px;padding:3px 9px;line-height:1;white-space:nowrap;
  }
  .delta svg{width:11px;height:11px}

  .kpis{display:flex;gap:22px}
  .kpi{min-width:64px}
  .kpi-v{font-size:20px;font-weight:600;line-height:1}
  .kpi-l{font-size:11px;color:var(--text-muted);margin-top:4px;white-space:nowrap}

  /* ---- section ---------------------------------------------------------*/
  .sec{margin-top:26px}
  .sec-head{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-bottom:8px}
  .sec-title{font-size:12.5px;font-weight:600;color:var(--text-secondary)}
  .sec-note{font-size:11px;color:var(--text-muted)}
  .chart-box{position:relative;width:100%}
  svg{display:block;width:100%;height:auto;overflow:visible}

  .axis-tick{fill:var(--text-muted);font-size:10px}
  .avg-label{fill:var(--text-secondary);font-size:10.5px;font-weight:600}
  .val-label{fill:var(--text-primary);font-size:10.5px;font-weight:600}

  /* ---- tooltip ---------------------------------------------------------*/
  .tip{
    position:absolute;pointer-events:none;z-index:5;
    background:var(--text-primary);color:var(--surface-1);
    border-radius:8px;padding:7px 10px;font-size:11.5px;line-height:1.35;
    transform:translate(-50%,-115%);white-space:nowrap;
    opacity:0;transition:opacity .09s ease;
    box-shadow:0 4px 14px rgba(0,0,0,.22);
  }
  .tip b{font-weight:650}
  .tip .t-sub{opacity:.72;font-size:10.5px}

  .legend-note{display:flex;gap:16px;flex-wrap:wrap;margin-top:10px;font-size:10.5px;color:var(--text-muted)}
  .legend-note span{display:inline-flex;align-items:center;gap:5px}
  .swatch{width:10px;height:10px;border-radius:2px;background:var(--series-1)}
  .swatch.none{background:transparent;border:1px dashed var(--baseline)}

  .foot{margin-top:22px;font-size:10.5px;color:var(--text-muted);line-height:1.5}

  /* interactive mark affordance */
  rect.hit{cursor:default}
  .bar-main{transition:opacity .09s ease}
  svg:hover .bar-main{opacity:.45}
  svg .bar-main.on{opacity:1}

  /* svg mark colors driven by CSS vars so they follow the theme with no redraw */
  .m-bar{fill:var(--series-1)}
  .m-baseline{stroke:var(--baseline)}
  .m-avg{stroke:var(--text-secondary)}
  .m-ring-surface{stroke:var(--surface-1)}
  .m-ring-series{stroke:var(--series-1)}
  .m-muted{fill:var(--text-muted)}
  .m-null{stroke:var(--baseline)}
</style>

<div class="viz-root">
 <div class="wrap">
  <div class="topbar">
    <h1>ZEN Study · ダッシュボード</h1>
    <button class="theme-btn" id="themeBtn" type="button">テーマ切替</button>
  </div>

  <div class="card">
    <div class="card-head">
      <div>
        <p class="card-title">学習数</p>
        <p class="card-sub">直近14日間 · 2週間ぶんの記録</p>
      </div>
    </div>

    <!-- HERO -->
    <div class="hero-row">
      <div>
        <p class="hero-label">累計 学習数</p>
        <div class="hero">
          <span class="hero-num" id="heroTotal">0</span>
          <span class="hero-unit">件</span>
          <span class="delta" id="todayDelta"></span>
        </div>
      </div>
      <div class="kpis">
        <div class="kpi"><div class="kpi-v" id="kpiAvg">0</div><div class="kpi-l">2週平均 / 日</div></div>
        <div class="kpi"><div class="kpi-v" id="kpiBest">0</div><div class="kpi-l" id="kpiBestL">最高の日</div></div>
        <div class="kpi"><div class="kpi-v" id="kpiActive">0</div><div class="kpi-l">学習した日</div></div>
      </div>
    </div>

    <!-- DAILY BARS -->
    <div class="sec">
      <div class="sec-head">
        <span class="sec-title">日別の学習数</span>
        <span class="sec-note">2週平均を基準線に</span>
      </div>
      <div class="chart-box">
        <svg id="daily" viewBox="0 0 700 240" role="img" aria-label="直近14日の日別学習数の棒グラフ、2週平均の基準線つき"></svg>
        <div class="tip" id="tipDaily"></div>
      </div>
      <div class="legend-note">
        <span><span class="swatch"></span>学習数</span>
        <span><span class="swatch none"></span>記録なし</span>
      </div>
    </div>

    <!-- WEEKDAY RHYTHM -->
    <div class="sec">
      <div class="sec-head">
        <span class="sec-title">曜日別のリズム</span>
        <span class="sec-note">各曜日 = 2週ぶんの平均</span>
      </div>
      <div class="chart-box">
        <svg id="weekday" viewBox="0 0 700 170" role="img" aria-label="曜日別の平均学習数の棒グラフ"></svg>
        <div class="tip" id="tipWk"></div>
      </div>
    </div>

    <p class="foot">
      表示専用の可視化です。データは学習数API（直近14日の日別 + 累計 + 2週平均）。曜日は日付から導出。
    </p>
  </div>
 </div>
</div>

<script>
(function(){
  "use strict";

  // ---- source data (as provided) --------------------------------------
  const DATA = {
    total_amount: 230,
    average_amount: 20.9,
    daily_amount: [
      {date:"2026-07-04", amount:null},
      {date:"2026-07-05", amount:null},
      {date:"2026-07-06", amount:18},
      {date:"2026-07-07", amount:6},
      {date:"2026-07-08", amount:4},
      {date:"2026-07-09", amount:0},
      {date:"2026-07-10", amount:23},
      {date:"2026-07-11", amount:26},
      {date:"2026-07-12", amount:16},
      {date:"2026-07-13", amount:38},
      {date:"2026-07-14", amount:21},
      {date:"2026-07-15", amount:46},
      {date:"2026-07-16", amount:28},
      {date:"2026-07-17", amount:4}
    ]
  };

  const SVGNS = "http://www.w3.org/2000/svg";
  const WD_JP = ["日","月","火","水","木","金","土"];
  const WD_FULL = ["日曜","月曜","火曜","水曜","木曜","金曜","土曜"];
  const el = (t,a)=>{const e=document.createElementNS(SVGNS,t);for(const k in a){if(k==="class")e.setAttribute("class",a[k]);else e.setAttribute(k,a[k]);}return e;};
  // rounded-top / square-base bar path
  const barPath = (cx,barW,top,yBase)=>{
    const h=yBase-top, r=Math.min(4,barW/2,h);
    return `M${cx-barW/2},${yBase} L${cx-barW/2},${top+r} Q${cx-barW/2},${top} ${cx-barW/2+r},${top} `
         + `L${cx+barW/2-r},${top} Q${cx+barW/2},${top} ${cx+barW/2},${top+r} L${cx+barW/2},${yBase} Z`;
  };
  const pxY = (svg,uy)=>{const vb=svg.viewBox.baseVal,r=svg.getBoundingClientRect();return r.height*(uy-vb.y)/vb.height;};

  // ---- derive ----------------------------------------------------------
  const days = DATA.daily_amount.map(d=>{
    const dt = new Date(d.date+"T00:00:00");
    return {date:d.date, amount:d.amount, wd:dt.getDay(),
            md:(dt.getMonth()+1)+"/"+dt.getDate()};
  });
  const valid = days.filter(d=>d.amount!=null);
  const active = valid.filter(d=>d.amount>0);
  const today = days[days.length-1];
  const best = valid.reduce((a,b)=>b.amount>a.amount?b:a, valid[0]);
  const maxV = best.amount;
  const avg = DATA.average_amount;

  // KPI fill
  document.getElementById("heroTotal").textContent = DATA.total_amount.toLocaleString();
  document.getElementById("kpiAvg").textContent = avg.toFixed(1);
  document.getElementById("kpiBest").textContent = maxV;
  document.getElementById("kpiBestL").textContent = "最高の日 ("+WD_JP[best.wd]+")";
  document.getElementById("kpiActive").textContent = active.length + "日";
  const dchip = document.getElementById("todayDelta");
  dchip.innerHTML = '<svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 10V2M6 2 2.5 5.5M6 2l3.5 3.5"/></svg> 今日 +'+today.amount;

  // ---- tooltip helper --------------------------------------------------
  function bindTip(tipEl){
    return {
      show(x,y,html){ tipEl.innerHTML=html; tipEl.style.left=x+"px"; tipEl.style.top=y+"px"; tipEl.style.opacity="1"; },
      hide(){ tipEl.style.opacity="0"; }
    };
  }

  // ---- DAILY BAR CHART -------------------------------------------------
  (function drawDaily(){
    const svg = document.getElementById("daily");
    const box = svg.parentNode;
    const tip = bindTip(document.getElementById("tipDaily"));
    const W=700, padL=20, padR=20, padT=26, padB=30;
    const plotW=W-padL-padR, plotH=240-padT-padB, yBase=padT+plotH;
    const scaleMax=50;                        // headroom above max(46)
    const y = v => yBase-(v/scaleMax)*plotH;
    const band=plotW/days.length, barW=Math.min(20,band-8);

    svg.appendChild(el("line",{"class":"m-baseline",x1:padL,y1:yBase,x2:W-padR,y2:yBase,"stroke-width":1}));

    // average reference line + label
    const ay=y(avg);
    svg.appendChild(el("line",{"class":"m-avg",x1:padL,y1:ay,x2:W-padR-58,y2:ay,"stroke-width":1,opacity:.55}));
    const alab=el("text",{"class":"avg-label",x:W-padR,y:ay+3.5,"text-anchor":"end"});
    alab.textContent="2週平均 "+avg.toFixed(1);
    svg.appendChild(alab);

    const bars=[];
    days.forEach((d,i)=>{
      const cx=padL+band*i+band/2;
      const isToday=i===days.length-1;

      const wt=el("text",{"class":"axis-tick",x:cx,y:240-12,"text-anchor":"middle"});
      wt.textContent=WD_JP[d.wd];
      svg.appendChild(wt);

      let bar=null;
      if(d.amount==null){
        svg.appendChild(el("line",{"class":"m-null",x1:cx-barW/2,y1:yBase,x2:cx+barW/2,y2:yBase,
          "stroke-width":2,"stroke-dasharray":"2 2","stroke-linecap":"round"}));
      }else if(d.amount===0){
        svg.appendChild(el("circle",{"class":"m-muted",cx:cx,cy:yBase-1.5,r:2}));
      }else{
        const top=y(d.amount), path=barPath(cx,barW,top,yBase);
        bar=el("path",{"class":"bar-main m-bar",d:path});
        svg.appendChild(bar);
        if(isToday){
          svg.appendChild(el("path",{"class":"m-ring-surface",d:path,fill:"none","stroke-width":2}));
          svg.appendChild(el("path",{"class":"m-ring-series",d:path,fill:"none","stroke-width":1.5}));
        }
      }
      bars[i]=bar;

      if(d.amount!=null && (isToday || d===best)){
        const t=el("text",{"class":"val-label",x:cx,y:y(d.amount||0)-7,"text-anchor":"middle"});
        t.textContent=(isToday?"今日 ":"")+d.amount;
        svg.appendChild(t);
      }

      const hit=el("rect",{"class":"hit",x:padL+band*i,y:padT-4,width:band,height:plotH+10,fill:"transparent"});
      const label=d.md+"（"+WD_FULL[d.wd]+"）";
      const val=d.amount==null? '<span class="t-sub">記録なし</span>'
        : '<b>'+d.amount+'</b> 件'+(d.amount>0?' <span class="t-sub">· 平均比 '+(d.amount-avg>=0?'+':'')+(d.amount-avg).toFixed(1)+'</span>':' <span class="t-sub">· 学習なし</span>');
      const anchorY=d.amount!=null?Math.min(y(d.amount),ay):yBase-8;
      hit.addEventListener("mousemove",(ev)=>{
        const r=box.getBoundingClientRect();
        if(bars[i])bars[i].classList.add("on");
        tip.show(ev.clientX-r.left, pxY(svg,anchorY)-4, label+'<br>'+val);
      });
      hit.addEventListener("mouseleave",()=>{ if(bars[i])bars[i].classList.remove("on"); tip.hide(); });
      svg.appendChild(hit);
    });
  })();

  // ---- WEEKDAY RHYTHM --------------------------------------------------
  (function drawWeekday(){
    const svg=document.getElementById("weekday");
    const box=svg.parentNode;
    const tip=bindTip(document.getElementById("tipWk"));
    const order=[1,2,3,4,5,6,0];               // 月→日
    const agg=order.map(wd=>{
      const items=days.filter(d=>d.wd===wd && d.amount!=null);
      const sum=items.reduce((s,d)=>s+d.amount,0);
      return {wd, items, n:items.length, avg: items.length? sum/items.length : null};
    });
    const W=700,padL=20,padR=20,padT=22,padB=26;
    const plotW=W-padL-padR, plotH=170-padT-padB, yBase=padT+plotH;
    const scaleMax=50, y=v=>yBase-(v/scaleMax)*plotH;
    const band=plotW/7, barW=Math.min(24,band-16);

    svg.appendChild(el("line",{"class":"m-baseline",x1:padL,y1:yBase,x2:W-padR,y2:yBase,"stroke-width":1}));
    const ay=y(avg);
    svg.appendChild(el("line",{"class":"m-avg",x1:padL,y1:ay,x2:W-padR,y2:ay,"stroke-width":1,opacity:.3}));

    const bars=[];
    agg.forEach((a,i)=>{
      const cx=padL+band*i+band/2;
      const lab=el("text",{"class":"axis-tick",x:cx,y:170-9,"text-anchor":"middle"});
      lab.textContent=WD_JP[a.wd];
      svg.appendChild(lab);

      let bar=null;
      if(a.avg!=null && a.avg>0){
        const top=y(a.avg);
        bar=el("path",{"class":"bar-main m-bar",d:barPath(cx,barW,top,yBase)});
        svg.appendChild(bar);
        const t=el("text",{"class":"val-label",x:cx,y:top-6,"text-anchor":"middle"});
        t.textContent=a.avg.toFixed(a.avg%1?1:0);
        svg.appendChild(t);
      }else{
        svg.appendChild(el("circle",{"class":"m-muted",cx:cx,cy:yBase-1.5,r:2}));
      }
      bars[i]=bar;

      const hit=el("rect",{"class":"hit",x:padL+band*i,y:padT-4,width:band,height:plotH+10,fill:"transparent"});
      const anchorY=a.avg!=null?y(a.avg):yBase-8;
      const detail=a.items.length
        ? a.items.map(d=>d.md+' <b>'+d.amount+'</b>').join('　・　')
        : '記録なし';
      const head=WD_FULL[a.wd]+(a.avg!=null?'　平均 <b>'+a.avg.toFixed(1)+'</b>'+(a.n<2?'（1週ぶん）':''):'');
      hit.addEventListener("mousemove",(ev)=>{
        const r=box.getBoundingClientRect();
        if(bars[i])bars[i].classList.add("on");
        tip.show(ev.clientX-r.left, pxY(svg,anchorY)-4, head+'<br><span class="t-sub">'+detail+'</span>');
      });
      hit.addEventListener("mouseleave",()=>{ if(bars[i])bars[i].classList.remove("on"); tip.hide(); });
      svg.appendChild(hit);
    });
  })();

  // ---- theme toggle (CSS vars drive svg colors → no redraw needed) ------
  document.getElementById("themeBtn").addEventListener("click",()=>{
    const root=document.documentElement;
    const cur=root.getAttribute("data-theme");
    const sysDark=matchMedia("(prefers-color-scheme:dark)").matches;
    root.setAttribute("data-theme", cur? (cur==="dark"?"light":"dark") : (sysDark?"light":"dark"));
  });
})();
</script>
